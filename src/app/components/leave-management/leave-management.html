<div class="container leave-container">
  <!-- Loader -->
  <div *ngIf="loading()" class="fullscreen-loader">
    <div class="loader-content">
      <div class="spinner-large"></div>
      <p>{{ savingLeaves() ? 'Saving leaves...' : 'Loading data...' }}</p>
    </div>
  </div>

  <div *ngIf="!loading()">
  <div class="glass-card header-card mb-4">
    <div class="header-content">
      <button class="btn btn-secondary" (click)="goBack()">← Back</button>
      <h2>Leave Management</h2>
      <div></div>
    </div>
  </div>

  <div class="glass-card">
    <div class="month-selector mb-3">
      <label for="month">Month:</label>
      <input 
        id="month" 
        type="month" 
        class="month-input" 
        [ngModel]="selectedMonth()" 
        (ngModelChange)="onMonthChange($event)"
      >
    </div>

    <h3 class="mb-3">Assign Leaves to Employees</h3>
    
    <div *ngIf="message()" class="alert">{{ message() }}</div>

    <div class="table-wrapper">
      <table class="employee-table">
        <thead>
          <tr>
            <th>Select</th>
            <th>ID</th>
            <th>Name</th>
            <th>PL (Privilege Leave)</th>
            <th>CL (Casual Leave)</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let emp of employees()">
            <td data-label="Select">
              <input 
                type="checkbox" 
                [checked]="emp.selected" 
                (change)="toggleEmployee(emp)"
              >
            </td>
            <td data-label="ID">{{ emp.id }}</td>
            <td data-label="Name">{{ emp.name }}</td>
            <td data-label="PL">
              <input 
                type="number" 
                class="leave-input" 
                min="0" 
                max="31"
                step="0.01"
                [(ngModel)]="emp.pl"
                [disabled]="!emp.selected"
              >
            </td>
            <td data-label="CL">
              <input 
                type="number" 
                class="leave-input" 
                min="0" 
                max="31"
                step="0.01"
                [(ngModel)]="emp.cl"
                [disabled]="!emp.selected"
              >
            </td>
          </tr>
          <tr *ngIf="employees().length === 0" class="no-records">
            <td colspan="5">No employees found.</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="action-footer">
      <button class="btn btn-primary" (click)="assignLeaves()">
        Assign Leaves
      </button>
    </div>
  </div>
  </div>
</div>
